[font]
normal = { family = "JetBrainsMono Nerd Font Mono", style = "Regular" }
size = 12.0
builtin_box_drawing = true

[colors.primary]
foreground = "#ffffff"
background = "#181818"

[colors.cursor]
cursor = "#cccccc"

[colors.selection]
background = "#264f78"

[colors.normal]
black   = "#000000"
red     = "#cd3131"
green   = "#0dbc79"
yellow  = "#e5e510"
blue    = "#2472c8"
magenta = "#bc3fbc"
cyan    = "#11a8cd"
white   = "#e5e5e5"

[colors.bright]
black   = "#666666"
red     = "#f14c4c"
green   = "#23d18b"
yellow  = "#f5f543"
blue    = "#3b8eea"
magenta = "#d670d6"
cyan    = "#29b8db"
white   = "#e5e5e5"

[scrolling]
history = 100000

[terminal.shell]
program = "/bin/zsh"
args = ["-l"]
