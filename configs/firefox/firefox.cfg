// autoconfig - first line must be a comment
lockPref("security.sandbox.warn_unprivileged_namespaces", false);
lockPref("datareporting.policy.dataSubmissionPolicyBypassNotification", true);

// hide devtools tabs
lockPref("devtools.accessibility.enabled", false);
lockPref("devtools.memory.enabled", false);
lockPref("devtools.performance.enabled", false);
lockPref("devtools.application.enabled", false);

// disable firefox view button
lockPref("browser.tabs.firefox-view", false);
lockPref("browser.tabs.firefox-view-next", false);

// force native gtk file picker. xdg-desktop-portal-xfce isn't installed
// (only the gtk backend is) and firefox 140 picks the portal in auto mode,
// then renders a blank dialog when the backend can't satisfy the call
lockPref("widget.use-xdg-desktop-portal.file-picker", 0);
