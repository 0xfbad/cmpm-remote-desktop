// autoconfig - first line must be a comment
lockPref("security.sandbox.warn_unprivileged_namespaces", false);
lockPref("datareporting.policy.dataSubmissionPolicyBypassNotification", true);

// hide devtools tabs
lockPref("devtools.accessibility.enabled", false);
lockPref("devtools.memory.enabled", false);
lockPref("devtools.performance.enabled", false);
lockPref("devtools.application.enabled", false);

// disable firefox view button
lockPref("browser.tabs.firefox-view", false);
lockPref("browser.tabs.firefox-view-next", false);

// force native gtk file picker. xdg-desktop-portal-xfce isn't installed
// (only the gtk backend is) and firefox 140 picks the portal in auto mode,
// then renders a blank dialog when the backend can't satisfy the call
lockPref("widget.use-xdg-desktop-portal.file-picker", 0);

// inject the staged ctfd session cookie then remove the file, errors go
// to /tmp/ctfd_inject.log since the browser console is unreachable here
function _ctfdLog(msg) {
  try {
    const lf = Cc["@mozilla.org/file/local;1"].createInstance(Ci.nsIFile);
    lf.initWithPath("/tmp/ctfd_inject.log");
    const fos = Cc["@mozilla.org/network/file-output-stream;1"].createInstance(Ci.nsIFileOutputStream);
    fos.init(lf, 0x02 | 0x08 | 0x10, 0o644, 0);
    const out = Cc["@mozilla.org/intl/converter-output-stream;1"].createInstance(Ci.nsIConverterOutputStream);
    out.init(fos, "UTF-8", 0, 0);
    out.writeString(new Date().toISOString() + " " + msg + "\n");
    out.close();
  } catch (_) {}
}

try {
  const f = Cc["@mozilla.org/file/local;1"].createInstance(Ci.nsIFile);
  f.initWithPath("/tmp/ctfd_auth.json");
  if (f.exists()) {
    const fis = Cc["@mozilla.org/network/file-input-stream;1"].createInstance(Ci.nsIFileInputStream);
    fis.init(f, 0x01, 0, 0);
    const cis = Cc["@mozilla.org/intl/converter-input-stream;1"].createInstance(Ci.nsIConverterInputStream);
    cis.init(fis, "UTF-8", 1024, Ci.nsIConverterInputStream.DEFAULT_REPLACEMENT_CHARACTER);
    let data = "", chunk = {};
    while (cis.readString(4096, chunk)) data += chunk.value;
    cis.close();

    const auth = JSON.parse(data);
    // URL constructor isn't a global in autoconfig context, use Services.io.newURI
    const uri = Services.io.newURI(auth.url);
    const isSecure = uri.scheme === "https";

    Services.cookies.add(
      uri.host, "/", auth.name, auth.value,
      isSecure,
      true,
      false,
      Math.floor(Date.now() / 1000) + 604800,
      {},
      Ci.nsICookie.SAMESITE_LAX,
      isSecure ? Ci.nsICookie.SCHEME_HTTPS : Ci.nsICookie.SCHEME_HTTP
    );

    f.remove(false);
    _ctfdLog("injected cookie for " + uri.host);
  }
} catch (e) {
  Components.utils.reportError("ctfd cookie inject: " + e);
  _ctfdLog("inject failed: " + e + " :: " + (e.stack || ""));
}
